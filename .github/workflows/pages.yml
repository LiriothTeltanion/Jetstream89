name: Validate and deploy Jetstream89 to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check assets/app.js
          node --check assets/v2.js

      - name: Validate static files, HTML and local links
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit

          root = Path('.').resolve()
          required = [
              'index.html',
              'schedule.html',
              'stories.html',
              'atlas.html',
              'crew.html',
              'merch.html',
              'studio.html',
              '404.html',
              'assets/styles.css',
              'assets/v2.css',
              'assets/app.js',
              'assets/v2.js',
              'assets/logo.svg',
              'assets/hero-flightdeck.svg',
              'manifest.webmanifest',
              'CHANGELOG.md',
          ]

          for item in required:
              if not (root / item).exists():
                  raise SystemExit(f'Missing required file: {item}')

          class LinkParser(HTMLParser):
              def __init__(self, page: Path) -> None:
                  super().__init__()
                  self.page = page
                  self.links: list[str] = []

              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  if tag not in {'a', 'img', 'link', 'script', 'iframe'}:
                      return
                  attributes = dict(attrs)
                  value = attributes.get('href') or attributes.get('src')
                  if value:
                      self.links.append(value)

          forbidden_brand = 'Jetstream' + '99'
          forbidden_brand_upper = forbidden_brand.upper()
          html_pages = sorted(root.glob('*.html'))
          if not html_pages:
              raise SystemExit('No HTML pages found.')

          for page in html_pages:
              text = page.read_text(encoding='utf-8')
              if forbidden_brand in text or forbidden_brand_upper in text:
                  raise SystemExit(f'Incorrect legacy brand found in {page.name}')

              parser = LinkParser(page)
              parser.feed(text)

              for raw_link in parser.links:
                  link = raw_link.strip()
                  if not link or link.startswith(('#', 'mailto:', 'tel:', 'javascript:', 'data:')):
                      continue
                  split = urlsplit(link)
                  if split.scheme or split.netloc:
                      continue

                  relative = split.path
                  if not relative:
                      continue

                  target = (page.parent / relative).resolve()
                  try:
                      target.relative_to(root)
                  except ValueError as exc:
                      raise SystemExit(f'Local link escapes repository in {page.name}: {link}') from exc

                  if not target.exists():
                      raise SystemExit(f'Broken local link in {page.name}: {link}')

              print(f'Validated {page.name} ({len(parser.links)} links)')

          public_suffixes = {'.html', '.css', '.js', '.json', '.svg'}
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              if path.suffix.lower() not in public_suffixes:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              if forbidden_brand in text or forbidden_brand_upper in text:
                  raise SystemExit(f'Incorrect legacy brand found in {path.relative_to(root)}')

          print('Jetstream89 brand and static-site validation passed.')
          PY

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
