<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Jetstream89 winged microphone</title>
  <desc id="desc">A neon broadcast microphone with aerodynamic wings and a small aircraft tail.</desc>
  <defs>
    <linearGradient id="cyanPink" x1="0" x2="1">
      <stop offset="0" stop-color="#27d9ff"/>
      <stop offset="1" stop-color="#ff2ea6"/>
    </linearGradient>
    <linearGradient id="pinkOrange" y1="0" y2="1">
      <stop offset="0" stop-color="#ff2ea6"/>
      <stop offset="1" stop-color="#ff6b3d"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
