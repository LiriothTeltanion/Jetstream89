<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Jetstream89 neon flightdeck</title>
  <desc id="desc">An original retro-futurist radio cockpit with a neon runway, skyline, radar and Jetstream89 microphone emblem.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070b1b"/>
      <stop offset="0.58" stop-color="#130a24"/>
      <stop offset="1" stop-color="#060914"/>
    </linearGradient>
    <linearGradient id="runway" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d9ff"/>
      <stop offset="0.52" stop-color="#8c63ff"/>
      <stop offset="1" stop-color="#ff2ea6"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d9ff"/>
      <stop offset="0.52" stop-color="#ff2ea6"/>
      <stop offset="1" stop-color="#ff7847"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#27d9ff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#27d9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#27d9ff" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="620" rx="38" fill="url(#sky)"/>
  <rect width="900" height="620" rx="38" fill="url(#grid)"/>
  <ellipse cx="620" cy="245" rx="245" ry="245" fill="url(#glow)"/>

  <g fill="#0f1730" stroke="#4b5d9b" stroke-opacity=".35">
    <path d="M0 390 0 286 42 286 42 230 80 230 80 312 118 312 118 206 158 206 158 285 201 285 201 250 235 250 235 390Z"/>
    <path d="M665 390 665 280 706 280 706 215 742 215 742 297 782 297 782 184 821 184 821 258 860 258 860 228 900 228 900 390Z"/>
  </g>

  <g opacity=".88">
    <path d="M450 360 202 620H698Z" fill="#08101d"/>
    <path d="M450 360 334 620" stroke="#27d9ff" stroke-width="8" filter="url(#neon)"/>
    <path d="M450 360 566 620" stroke="#ff2ea6" stroke-width="8" filter="url(#neon)"/>
    <path d="M450 360 410 620M450 360 490 620" stroke="#ffffff" stroke-opacity=".64" stroke-width="3" stroke-dasharray="18 22"/>
    <path d="M450 360 250 620M450 360 650 620" stroke="url(#runway)" stroke-opacity=".45" stroke-width="2"/>
  </g>

  <g transform="translate(470 70)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <circle cx="150" cy="150" r="132" stroke="#27d9ff" stroke-opacity=".34" stroke-width="2" stroke-dasharray="6 12"/>
    <path d="M118 168 20 132l31 40 60 26M182 168l98-36-31 40-60 26" stroke="url(#mic)" stroke-width="14"/>
    <rect x="118" y="44" width="64" height="176" rx="32" fill="#07101b" stroke="url(#mic)" stroke-width="12"/>
    <path d="M133 78h34M133 106h34M133 134h34M133 162h34" stroke="#ff2ea6" stroke-width="8"/>
    <path d="M96 172v17c0 38 23 62 54 62s54-24 54-62v-17" stroke="#27d9ff" stroke-width="11"/>
    <path d="M150 251v42M126 296h48" stroke="#ff7847" stroke-width="10"/>
  </g>

  <g transform="translate(42 42)">
    <rect width="250" height="102" rx="18" fill="#050914" fill-opacity=".84" stroke="#27d9ff" stroke-opacity=".28"/>
    <text x="22" y="33" fill="#9aa6b7" font-family="monospace" font-size="13" letter-spacing="2">JETSTREAM89 CONTROL</text>
    <text x="22" y="65" fill="#27d9ff" font-family="sans-serif" font-weight="900" font-size="26">TURN UP.</text>
    <text x="22" y="91" fill="#ff2ea6" font-family="sans-serif" font-weight="900" font-size="26">TAKE FLIGHT.</text>
  </g>

  <g transform="translate(48 486)">
    <rect width="190" height="82" rx="17" fill="#050914" fill-opacity=".84" stroke="#ff2ea6" stroke-opacity=".3"/>
    <circle cx="28" cy="28" r="7" fill="#ff3b5c"/>
    <text x="48" y="34" fill="#f7f8fb" font-family="monospace" font-size="15">PREVIEW SIGNAL</text>
    <text x="22" y="61" fill="#9aa6b7" font-family="monospace" font-size="12">EN / ES · HUMAN CURATED</text>
  </g>

  <g fill="#f7f8fb">
    <circle cx="115" cy="170" r="2"/><circle cx="334" cy="82" r="2"/><circle cx="790" cy="92" r="2"/><circle cx="742" cy="345" r="2"/>
  </g>
</svg>
